<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キーボードなし文字入力ソフト</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 30px;
            /* ドラッグ時のテキスト選択などを防ぐ */
            user-select: none; 
            -webkit-user-select: none;
        }
        #output-area {
            width: 80%;
            max-width: 400px;
            height: 50px;
            font-size: 24px;
            margin: 0 auto 20px auto;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            text-align: left;
            overflow-x: auto;
            white-space: nowrap;
        }

        #input-pad {
            width: 250px;
            height: 250px;
            margin: 0 auto 20px auto;
            border: 3px dashed #888;
            border-radius: 15px;
            background-color: #eef;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            align-items: center;
            justify-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #555;
            cursor: crosshair;
            touch-action: none; 
        }

        .guide-char {
            color: #888;
        }

        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }
        button {
            font-size: 20px;
            padding: 15px 20px;
            cursor: pointer;
            border: 1px solid #999;
            border-radius: 5px;
            background-color: #fff;
        }
        button:hover {
            background-color: #e0e0e0;
        }
        .control-btn {
            background-color: #f0c0c0;
        }
        .control-btn:hover {
            background-color: #d0a0a0;
        }
    </style>
</head>
<body>

    <h1>文字入力（スマホ風フリック対応）</h1>

    <div id="output-area"></div>

    <div id="input-pad">
        <div></div><div class="guide-char">う</div><div></div>
        <div class="guide-char">い</div><div>あ</div><div class="guide-char">え</div>
        <div></div><div class="guide-char">お</div><div></div>
    </div>

    <div class="keyboard">
        <button onclick="addChar('あ')">あ</button>
        <button onclick="addChar('い')">い</button>
        <button onclick="addChar('う')">う</button>
        <button onclick="addChar('え')">え</button>
        <button onclick="addChar('お')">お</button>
        
        <button class="control-btn" onclick="deleteChar()">削除</button>
        <button class="control-btn" onclick="clearAll()">クリア</button>
    </div>

    <script>
        let currentText = "";
        const outputArea = document.getElementById("output-area");
        const inputPad = document.getElementById("input-pad");

        function updateDisplay() {
            outputArea.textContent = currentText;
        }

        function addChar(char) {
            currentText += char;
            updateDisplay();
        }

        function deleteChar() {
            if (currentText.length > 0) {
                currentText = currentText.slice(0, -1);
                updateDisplay();
            }
        }

        function clearAll() {
            currentText = "";
            updateDisplay();
        }

        // --- フリック入力の処理（修正版） ---
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let activePointerId = null;
        const THRESHOLD = 30;

        function resetDrag(e) {
            isDragging = false;
            activePointerId = null;
            inputPad.style.backgroundColor = "#eef";

            if (e && inputPad.hasPointerCapture && inputPad.hasPointerCapture(e.pointerId)) {
                inputPad.releasePointerCapture(e.pointerId);
            }
        }

        inputPad.addEventListener("contextmenu", (e) => {
            // 右クリックメニューでフリック処理が邪魔されないようにする
            e.preventDefault();
        });

        inputPad.addEventListener("pointerdown", (e) => {
            // 左クリック以外は無視する
            if (e.button !== 0) return;

            isDragging = true;
            activePointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            inputPad.style.backgroundColor = "#ccf";
            inputPad.setPointerCapture(e.pointerId);
        });

        inputPad.addEventListener("pointerup", (e) => {
            if (!isDragging) return;

            const endX = e.clientX;
            const endY = e.clientY;

            // 先に後片付けする
            resetDrag(e);

            // 入力パッドの範囲外で離した場合は、入力せずキャンセルする
            const rect = inputPad.getBoundingClientRect();
            const isOutsidePad =
                endX < rect.left ||
                endX > rect.right ||
                endY < rect.top ||
                endY > rect.bottom;

            if (isOutsidePad) {
                return;
            }

            const dx = endX - startX;
            const dy = endY - startY;

            let charToInput = "";

            if (Math.abs(dx) < THRESHOLD && Math.abs(dy) < THRESHOLD) {
                charToInput = "あ";
            } else {
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        charToInput = "え";
                    } else {
                        charToInput = "い";
                    }
                } else {
                    if (dy > 0) {
                        charToInput = "お";
                    } else {
                        charToInput = "う";
                    }
                }
            }

            addChar(charToInput);
        });

        inputPad.addEventListener("pointercancel", (e) => {
            resetDrag(e);
        });

        inputPad.addEventListener("lostpointercapture", (e) => {
            if (isDragging) {
                resetDrag(e);
            }
        });
    </script>

</body>
</html>
