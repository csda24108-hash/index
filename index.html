<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キーボードなし文字入力ソフト</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 30px;
            /* ドラッグ時のテキスト選択などを防ぐ */
            user-select: none; 
            -webkit-user-select: none;
        }
        #output-area {
            width: 80%;
            max-width: 400px;
            height: 50px;
            font-size: 24px;
            margin: 0 auto 20px auto;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            text-align: left;
            overflow-x: auto;
            white-space: nowrap;
        }

        /* 行選択ボタンのエリア */
        .row-keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 450px;
            margin: 0 auto 20px auto;
        }

        #input-pad {
            width: 250px;
            height: 250px;
            margin: 0 auto 20px auto;
            border: 3px dashed #888;
            border-radius: 15px;
            background-color: #eef;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            align-items: center;
            justify-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #555;
            cursor: crosshair;
            touch-action: none; 
        }

        .guide-char {
            color: #888;
        }

        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        button {
            font-size: 20px;
            padding: 10px 15px;
            cursor: pointer;
            border: 1px solid #999;
            border-radius: 5px;
            background-color: #fff;
            transition: 0.2s;
        }
        button:hover {
            background-color: #e0e0e0;
        }

        /* 選択中の行ボタンの見た目 */
        .row-btn.selected-row {
            background-color: #a0c0f0;
            border-color: #6080b0;
            color: #fff;
            font-weight: bold;
        }

        .control-btn {
            background-color: #f0c0c0;
            padding: 15px 30px;
            font-weight: bold;
        }
        .control-btn:hover {
            background-color: #d0a0a0;
        }
    </style>
</head>
<body>

    <h1>文字入力（スマホ風フリック対応）</h1>

    <div id="output-area"></div>

    <div class="row-keyboard">
        <button id="row-あ" onclick="selectRow('あ')" class="row-btn selected-row">あ行</button>
        <button id="row-か" onclick="selectRow('か')" class="row-btn">か行</button>
        <button id="row-さ" onclick="selectRow('さ')" class="row-btn">さ行</button>
        <button id="row-た" onclick="selectRow('た')" class="row-btn">た行</button>
        <button id="row-な" onclick="selectRow('な')" class="row-btn">な行</button>
        <button id="row-は" onclick="selectRow('は')" class="row-btn">は行</button>
        <button id="row-ま" onclick="selectRow('ま')" class="row-btn">ま行</button>
        <button id="row-や" onclick="selectRow('や')" class="row-btn">や行</button>
        <button id="row-ら" onclick="selectRow('ら')" class="row-btn">ら行</button>
        <button id="row-わ" onclick="selectRow('わ')" class="row-btn">わ行</button>
    </div>

    <div id="input-pad">
        <div></div><div id="pad-up" class="guide-char">う</div><div></div>
        <div id="pad-left" class="guide-char">い</div><div id="pad-center">あ</div><div id="pad-right" class="guide-char">え</div>
        <div></div><div id="pad-down" class="guide-char">お</div><div></div>
    </div>

    <div class="keyboard">
        <button class="control-btn" onclick="deleteChar()">削除</button>
        <button class="control-btn" onclick="clearAll()">クリア</button>
    </div>

    <script>
        let currentText = "";
        const outputArea = document.getElementById("output-area");
        const inputPad = document.getElementById("input-pad");

        function updateDisplay() {
            outputArea.textContent = currentText;
        }

        function addChar(char) {
            currentText += char;
            updateDisplay();
        }

        function deleteChar() {
            if (currentText.length > 0) {
                currentText = currentText.slice(0, -1);
                updateDisplay();
            }
        }

        function clearAll() {
            currentText = "";
            updateDisplay();
        }

        // --- 50音のフリック割り当てマップ ---
        const flickMap = {
            'あ': { center: 'あ', left: 'い', up: 'う', right: 'え', down: 'お' },
            'か': { center: 'か', left: 'き', up: 'く', right: 'け', down: 'こ' },
            'さ': { center: 'さ', left: 'し', up: 'す', right: 'せ', down: 'そ' },
            'た': { center: 'た', left: 'ち', up: 'つ', right: 'て', down: 'と' },
            'な': { center: 'な', left: 'に', up: 'ぬ', right: 'ね', down: 'の' },
            'は': { center: 'は', left: 'ひ', up: 'ふ', right: 'へ', down: 'ほ' },
            'ま': { center: 'ま', left: 'み', up: 'む', right: 'め', down: 'も' },
            'や': { center: 'や', left: '',   up: 'ゆ', right: '',   down: 'よ' }, // 存在しない方向は空文字
            'ら': { center: 'ら', left: 'り', up: 'る', right: 'れ', down: 'ろ' },
            'わ': { center: 'わ', left: '',   up: '',   right: 'を', down: 'ん' }
        };

        let currentRow = 'あ';

        // 行選択ボタンを押したときの処理
        function selectRow(rowKey) {
            currentRow = rowKey;
            
            // 全ての行ボタンから選択中の色（クラス）を外し、クリックされたボタンだけに付ける
            document.querySelectorAll('.row-btn').forEach(btn => {
                btn.classList.remove('selected-row');
            });
            document.getElementById('row-' + rowKey).classList.add('selected-row');

            // フリック入力パッドの表示文字を更新する
            const chars = flickMap[rowKey];
            document.getElementById('pad-center').textContent = chars.center || "";
            document.getElementById('pad-left').textContent = chars.left || "";
            document.getElementById('pad-up').textContent = chars.up || "";
            document.getElementById('pad-right').textContent = chars.right || "";
            document.getElementById('pad-down').textContent = chars.down || "";
        }

        // --- フリック入力の処理（前回修正版を保持） ---
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let activePointerId = null;
        const THRESHOLD = 30;

        function resetDrag(e) {
            isDragging = false;
            activePointerId = null;
            inputPad.style.backgroundColor = "#eef";

            if (e && inputPad.hasPointerCapture && inputPad.hasPointerCapture(e.pointerId)) {
                inputPad.releasePointerCapture(e.pointerId);
            }
        }

        inputPad.addEventListener("contextmenu", (e) => {
            // 右クリックメニューでフリック処理が邪魔されないようにする
            e.preventDefault();
        });

        inputPad.addEventListener("pointerdown", (e) => {
            // 左クリック以外は無視する
            if (e.button !== 0) return;

            isDragging = true;
            activePointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            inputPad.style.backgroundColor = "#ccf";
            inputPad.setPointerCapture(e.pointerId);
        });

        inputPad.addEventListener("pointerup", (e) => {
            if (!isDragging) return;

            const endX = e.clientX;
            const endY = e.clientY;

            // 先に後片付けする
            resetDrag(e);

            // 入力パッドの範囲外で離した場合は、入力せずキャンセルする
            const rect = inputPad.getBoundingClientRect();
            const isOutsidePad =
                endX < rect.left ||
                endX > rect.right ||
                endY < rect.top ||
                endY > rect.bottom;

            if (isOutsidePad) {
                return;
            }

            const dx = endX - startX;
            const dy = endY - startY;

            let charToInput = "";
            const chars = flickMap[currentRow];

            if (Math.abs(dx) < THRESHOLD && Math.abs(dy) < THRESHOLD) {
                charToInput = chars.center;
            } else {
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        charToInput = chars.right;
                    } else {
                        charToInput = chars.left;
                    }
                } else {
                    if (dy > 0) {
                        charToInput = chars.down;
                    } else {
                        charToInput = chars.up;
                    }
                }
            }

            // charToInput が空文字（や行・わ行の存在しない方向など）でなければ入力する
            if (charToInput) {
                addChar(charToInput);
            }
        });

        inputPad.addEventListener("pointercancel", (e) => {
            resetDrag(e);
        });

        inputPad.addEventListener("lostpointercapture", (e) => {
            if (isDragging) {
                resetDrag(e);
            }
        });
    </script>

</body>
</html>
