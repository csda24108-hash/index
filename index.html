<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キーボードなし文字入力ソフト</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 10px;
            /* ドラッグ時のテキスト選択などを防ぐ */
            user-select: none; 
            -webkit-user-select: none;
        }

        h1 {
            font-size: 20px;
            margin: 5px 0 8px 0;
        }
        
        #output-area {
            width: 80%;
            max-width: 600px;
            height: 40px;
            font-size: 24px;
            margin: 0 auto 10px auto;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            text-align: left;
            overflow-x: auto;
            white-space: nowrap;
        }

        /* 2列レイアウト用のメインコンテナ */
        .main-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 左側：ボタン群 */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        /* 右側：フリックパッド */
        .right-panel {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 行選択ボタン（3列グリッド） */
        .row-keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-width: 300px;
        }

        /* わ行を中央（2列目）に配置 */
        #row-わ {
            grid-column: 2;
        }

        /* 補助ボタン（記号・変換）のエリア */
        .aux-keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            max-width: 300px;
        }

        /* 操作ボタン（削除・クリア）のエリア */
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        /* 入力パッド */
        #input-pad {
            width: 260px;
            height: 260px;
            border: 3px dashed #888;
            border-radius: 15px;
            background-color: #eef;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            align-items: center;
            justify-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #555;
            cursor: crosshair;
            touch-action: none; 
        }

        .guide-char {
            color: #888;
        }
        
        button {
            font-size: 16px;
            padding: 6px 10px;
            cursor: pointer;
            border: 1px solid #999;
            border-radius: 5px;
            background-color: #fff;
            transition: 0.2s;
        }
        button:hover {
            background-color: #e0e0e0;
        }

        /* 選択中の行ボタンの見た目 */
        .row-btn.selected-row {
            background-color: #a0c0f0;
            border-color: #6080b0;
            color: #fff;
            font-weight: bold;
        }

        /* 記号・変換ボタンの見た目 */
        .aux-btn {
            background-color: #e0f7fa;
            border-color: #4dd0e1;
        }
        .aux-btn:hover {
            background-color: #b2ebf2;
        }

        /* 制御ボタン（削除・クリア）の見た目 */
        .control-btn {
            background-color: #f0c0c0;
            padding: 10px 20px;
            font-weight: bold;
        }
        .control-btn:hover {
            background-color: #d0a0a0;
        }

        /* 画面幅が狭い場合は縦並びにする */
        @media (max-width: 520px) {
            .main-container {
                flex-direction: column-reverse;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <h1>文字入力（スマホ風フリック対応）</h1>

    <div id="output-area"></div>

    <div class="main-container">
        
        <div class="left-panel">
            <div class="row-keyboard">
                <button id="row-あ" onclick="selectRow('あ')" class="row-btn selected-row">あ行</button>
                <button id="row-か" onclick="selectRow('か')" class="row-btn">か行</button>
                <button id="row-さ" onclick="selectRow('さ')" class="row-btn">さ行</button>
                <button id="row-た" onclick="selectRow('た')" class="row-btn">た行</button>
                <button id="row-な" onclick="selectRow('な')" class="row-btn">な行</button>
                <button id="row-は" onclick="selectRow('は')" class="row-btn">は行</button>
                <button id="row-ま" onclick="selectRow('ま')" class="row-btn">ま行</button>
                <button id="row-や" onclick="selectRow('や')" class="row-btn">や行</button>
                <button id="row-ら" onclick="selectRow('ら')" class="row-btn">ら行</button>
                <button id="row-わ" onclick="selectRow('わ')" class="row-btn">わ行</button>
            </div>

            <div class="aux-keyboard">
                <button class="aux-btn" onclick="addChar('ー')">ー</button>
                <button class="aux-btn" onclick="addChar('、')">、</button>
                <button class="aux-btn" onclick="addChar('。')">。</button>
                <button class="aux-btn" onclick="addChar('？')">？</button>
                <button class="aux-btn" onclick="addChar('！')">！</button>
                <button class="aux-btn" onclick="transformChar('dakuten')">゛</button>
                <button class="aux-btn" onclick="transformChar('handakuten')">゜</button>
                <button class="aux-btn" onclick="transformChar('small')">小</button>
            </div>

            <div class="keyboard">
                <button class="control-btn" onclick="deleteChar()">削除</button>
                <button class="control-btn" onclick="clearAll()">クリア</button>
            </div>
        </div>

        <div class="right-panel">
            <div id="input-pad">
                <div></div><div id="pad-up" class="guide-char">う</div><div></div>
                <div id="pad-left" class="guide-char">い</div><div id="pad-center">あ</div><div id="pad-right" class="guide-char">え</div>
                <div></div><div id="pad-down" class="guide-char">お</div><div></div>
            </div>
        </div>

    </div>

    <script>
        let currentText = "";
        const outputArea = document.getElementById("output-area");
        const inputPad = document.getElementById("input-pad");

        function updateDisplay() {
            outputArea.textContent = currentText;
        }

        function addChar(char) {
            currentText += char;
            updateDisplay();
        }

        function deleteChar() {
            if (currentText.length > 0) {
                currentText = currentText.slice(0, -1);
                updateDisplay();
            }
        }

        function clearAll() {
            currentText = "";
            updateDisplay();
        }

        // --- 変換マップ（濁音・半濁音・小文字の相互トグル用） ---
        const mapDakuten = {
            'か':'が', 'が':'か', 'き':'ぎ', 'ぎ':'き', 'く':'ぐ', 'ぐ':'く', 'け':'げ', 'げ':'け', 'こ':'ご', 'ご':'こ',
            'さ':'ざ', 'ざ':'さ', 'し':'じ', 'じ':'し', 'す':'ず', 'ず':'す', 'せ':'ぜ', 'ぜ':'せ', 'そ':'ぞ', 'ぞ':'そ',
            'た':'だ', 'だ':'た', 'ち':'ぢ', 'ぢ':'ち', 'つ':'づ', 'づ':'つ', 'て':'で', 'で':'て', 'と':'ど', 'ど':'と',
            'は':'ば', 'ば':'は', 'ひ':'び', 'び':'ひ', 'ふ':'ぶ', 'ぶ':'ふ', 'へ':'べ', 'べ':'へ', 'ほ':'ぼ', 'ぼ':'ほ'
        };

        const mapHandakuten = {
            'は':'ぱ', 'ぱ':'は', 'ひ':'ぴ', 'ぴ':'ひ', 'ふ':'ぷ', 'ぷ':'ふ', 'へ':'ぺ', 'ぺ':'へ', 'ほ':'ぽ', 'ぽ':'ほ'
        };

        const mapSmall = {
            'あ':'ぁ', 'ぁ':'あ', 'い':'ぃ', 'ぃ':'い', 'う':'ぅ', 'ぅ':'う', 'え':'ぇ', 'ぇ':'え', 'お':'ぉ', 'ぉ':'お',
            'や':'ゃ', 'ゃ':'や', 'ゆ':'ゅ', 'ゅ':'ゆ', 'よ':'ょ', 'ょ':'よ', 'つ':'っ', 'っ':'つ'
        };

        function transformChar(type) {
            if (currentText.length === 0) return;
            
            const lastChar = currentText.slice(-1);
            let targetMap = null;

            if (type === 'dakuten') targetMap = mapDakuten;
            if (type === 'handakuten') targetMap = mapHandakuten;
            if (type === 'small') targetMap = mapSmall;

            // 変換マップに存在する場合のみ、最後の1文字を差し替える
            if (targetMap && targetMap[lastChar]) {
                currentText = currentText.slice(0, -1) + targetMap[lastChar];
                updateDisplay();
            }
        }

        // --- 50音のフリック割り当てマップ ---
        const flickMap = {
            'あ': { center: 'あ', left: 'い', up: 'う', right: 'え', down: 'お' },
            'か': { center: 'か', left: 'き', up: 'く', right: 'け', down: 'こ' },
            'さ': { center: 'さ', left: 'し', up: 'す', right: 'せ', down: 'そ' },
            'た': { center: 'た', left: 'ち', up: 'つ', right: 'て', down: 'と' },
            'な': { center: 'な', left: 'に', up: 'ぬ', right: 'ね', down: 'の' },
            'は': { center: 'は', left: 'ひ', up: 'ふ', right: 'へ', down: 'ほ' },
            'ま': { center: 'ま', left: 'み', up: 'む', right: 'め', down: 'も' },
            'や': { center: 'や', left: '',   up: 'ゆ', right: '',   down: 'よ' },
            'ら': { center: 'ら', left: 'り', up: 'る', right: 'れ', down: 'ろ' },
            'わ': { center: 'わ', left: 'を', up: 'ん', right: '', down: '' }
        };

        let currentRow = 'あ';

        // 行選択ボタンを押したときの処理
        function selectRow(rowKey) {
            currentRow = rowKey;
            
            // 全ての行ボタンから選択中の色（クラス）を外し、クリックされたボタンだけに付ける
            document.querySelectorAll('.row-btn').forEach(btn => {
                btn.classList.remove('selected-row');
            });
            document.getElementById('row-' + rowKey).classList.add('selected-row');

            // フリック入力パッドの表示文字を更新する
            const chars = flickMap[rowKey];
            document.getElementById('pad-center').textContent = chars.center || "";
            document.getElementById('pad-left').textContent = chars.left || "";
            document.getElementById('pad-up').textContent = chars.up || "";
            document.getElementById('pad-right').textContent = chars.right || "";
            document.getElementById('pad-down').textContent = chars.down || "";
        }

        // --- フリック入力の処理 ---
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let activePointerId = null;
        
        const THRESHOLD = 20;
        const CANCEL_MARGIN = 70;

        function resetDrag(e) {
            isDragging = false;
            activePointerId = null;
            inputPad.style.backgroundColor = "#eef";

            if (e && inputPad.hasPointerCapture && inputPad.hasPointerCapture(e.pointerId)) {
                inputPad.releasePointerCapture(e.pointerId);
            }
        }

        inputPad.addEventListener("contextmenu", (e) => {
            // 右クリックメニューでフリック処理が邪魔されないようにする
            e.preventDefault();
        });

        inputPad.addEventListener("pointerdown", (e) => {
            // 左クリック以外は無視する
            if (e.button !== 0) return;

            isDragging = true;
            activePointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            inputPad.style.backgroundColor = "#ccf";
            inputPad.setPointerCapture(e.pointerId);
        });

        inputPad.addEventListener("pointerup", (e) => {
            if (!isDragging) return;

            const endX = e.clientX;
            const endY = e.clientY;

            // 先に後片付けする
            resetDrag(e);

            // 猶予（マージン）を含めた入力パッドの判定枠
            const rect = inputPad.getBoundingClientRect();
            const isOutsidePad =
                endX < rect.left - CANCEL_MARGIN ||
                endX > rect.right + CANCEL_MARGIN ||
                endY < rect.top - CANCEL_MARGIN ||
                endY > rect.bottom + CANCEL_MARGIN;

            // 大きく外れた場合は入力せずキャンセル
            if (isOutsidePad) {
                return;
            }

            const dx = endX - startX;
            const dy = endY - startY;

            let charToInput = "";
            const chars = flickMap[currentRow];

            if (Math.abs(dx) < THRESHOLD && Math.abs(dy) < THRESHOLD) {
                charToInput = chars.center;
            } else {
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        charToInput = chars.right;
                    } else {
                        charToInput = chars.left;
                    }
                } else {
                    if (dy > 0) {
                        charToInput = chars.down;
                    } else {
                        charToInput = chars.up;
                    }
                }
            }

            // charToInput が空文字（や行・わ行の存在しない方向など）でなければ入力する
            if (charToInput) {
                addChar(charToInput);
            }
        });

        inputPad.addEventListener("pointercancel", (e) => {
            resetDrag(e);
        });

        inputPad.addEventListener("lostpointercapture", (e) => {
            if (isDragging) {
                resetDrag(e);
            }
        });
    </script>

</body>
</html>
